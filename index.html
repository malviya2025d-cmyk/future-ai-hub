<script>

function showTab(tabId){

const tabs = document.querySelectorAll('.tabContent');
const btns = document.querySelectorAll('.tabBtn');

tabs.forEach(tab=>{
tab.classList.remove('active');
});

btns.forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById(tabId).classList.add('active');

event.target.classList.add('active');

}

async function generateAI(){

const topic = document.getElementById('topic').value;

if(topic === ''){
alert('Please enter a topic');
return;
}

document.getElementById('loading').innerHTML = 'Generating AI Content...';

const API_KEY = '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';

const prompt = `
Generate content for YouTube Shorts.

Topic: ${topic}

Give response exactly in this format:

TITLE:

DESCRIPTION:

HASHTAGS:

TAGS:

30 SECOND SCRIPT:

7 SCENE IMAGE PROMPTS:

THUMBNAIL TEXT:

BEST UPLOAD TIME INDIA:
`;

try{

const response = await fetch(
'https://api.groq.com/openai/v1/chat/completions',
{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:'llama-3.3-70b-versatile',
messages:[
{
role:'user',
content:prompt
}
],
temperature:0.7
})
}
);

const data = await response.json();

console.log(data);

if(data.error){
alert(data.error.message);
return;
}

const result = data.choices[0].message.content;

function extractSection(start, end){
const regex = new RegExp(start + '([\\s\\S]*?)' + end);
const match = result.match(regex);
return match ? match[1].trim() : 'Not Generated';
}

document.getElementById('titleText').innerText =
extractSection('TITLE:', 'DESCRIPTION:');


document.getElementById('descriptionText').innerText =
extractSection('DESCRIPTION:', 'HASHTAGS:');


document.getElementById('hashtagsText').innerText =
extractSection('HASHTAGS:', 'TAGS:');


document.getElementById('tagsText').innerText =
extractSection('TAGS:', '30 SECOND SCRIPT:');


document.getElementById('scriptText').innerText =
extractSection('30 SECOND SCRIPT:', '7 SCENE IMAGE PROMPTS:');


document.getElementById('promptsText').innerText =
extractSection('7 SCENE IMAGE PROMPTS:', 'THUMBNAIL TEXT:');


document.getElementById('thumbnailText').innerText =
extractSection('THUMBNAIL TEXT:', 'BEST UPLOAD TIME INDIA:');


document.getElementById('uploadText').innerText =
result.split('BEST UPLOAD TIME INDIA:')[1];


document.getElementById('loading').innerHTML = '';

}catch(error){

console.log(error);

document.getElementById('loading').innerHTML = 'Error Loading Content';

}

}

function copyContent(id){

const text = document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

alert('Copied Successfully');

}

</script>
