<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Shorts Creator</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0d0d0d;
    color:white;
    font-family:Arial;
}

header{
    background:#111;
    text-align:center;
    padding:30px;
    border-bottom:2px solid gold;
}

header h1{
    color:gold;
    font-size:42px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    margin-top:40px;
}

.card{
    background:#1a1a1a;
    padding:25px;
    border-radius:20px;
    border:1px solid #333;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
    font-size:18px;
    margin-top:15px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:gold;
    color:black;
    font-size:18px;
    font-weight:bold;
    margin-top:20px;
    cursor:pointer;
}

button:hover{
    background:orange;
}

.resultBox{
    background:#111;
    padding:20px;
    border-radius:15px;
    margin-top:25px;
    border:1px solid #333;
}

.resultBox h2{
    color:gold;
}

.copyBtn{
    background:#222;
    color:white;
}

.footer{
    text-align:center;
    color:#888;
    padding:30px;
}

.loading{
    color:gold;
    text-align:center;
    margin-top:20px;
    font-size:18px;
}

pre{
    white-space:pre-wrap;
    line-height:30px;
    font-size:16px;
    font-family:Arial;
}

</style>

</head>

<body>

<header>

<h1>AI Shorts Creator 🚀</h1>

<p>Create Viral Shorts Content In One Click</p>

</header>

<div class="container">

<div class="card">

<h2>Enter Video Topic</h2>

<input
type="text"
id="topic"
placeholder="Example: sad motivation story"
/>

<button onclick="generateAI()">
Generate Viral Content 🔥
</button>

<div id="loading" class="loading"></div>

<div id="output"></div>

</div>

</div>

<div class="footer">
Made For Indian Creators ❤️
</div>

<script>

async function generateAI(){

const topic =
document.getElementById("topic").value;

if(topic === ""){

alert("Please enter a topic");

return;

}

document.getElementById("loading").innerHTML =
"Generating AI Content...";

document.getElementById("output").innerHTML = "";

/* DIRECT API KEY */
const API_KEY = "YOUR_GROQ_API_KEY";

const prompt = `
Generate:

1 Viral Hook

1 Emotional 30 second YouTube Shorts script

7 cinematic image prompts

1 thumbnail text

10 viral hashtags

Best upload time for India

Short captions

Topic:
${topic}

Give everything in clean formatting.
`;

try{

const response = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${API_KEY}`
},

body:JSON.stringify({

model:"llama3-70b-8192",

messages:[
{
role:"user",
content: prompt
}
],

temperature:0.7

})

}
);

const data = await response.json();

console.log(data);

/* ERROR CHECK */

if(data.error){

document.getElementById("loading").innerHTML = "";

document.getElementById("output").innerHTML = `

<div class="resultBox">

<h2>Error ❌</h2>

<p>${data.error.message}</p>

</div>

`;

return;

}

/* RESULT */

const result =
data.choices[0].message.content;

document.getElementById("loading").innerHTML = "";

document.getElementById("output").innerHTML = `

<div class="resultBox">

<h2>Generated Content 🚀</h2>

<pre id="aiText">${result}</pre>

<button
class="copyBtn"
onclick="copyText()">
Copy Content
</button>

</div>

`;

}catch(error){

console.log(error);

document.getElementById("loading").innerHTML = "";

document.getElementById("output").innerHTML = `

<div class="resultBox">

<h2>Error ❌</h2>

<p>
Something went wrong.
</p>

</div>

`;

}

}

function copyText(){

const text =
document.getElementById("aiText").innerText;

navigator.clipboard.writeText(text);

alert("Content Copied!");

}

</script>

</body>

</html>
